<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <div id="auth-panel">
        <p id="auth-status">Teacher login required to register or unregister students.</p>
        <div id="auth-actions">
          <form id="login-form" class="inline-form">
            <input type="email" id="username" placeholder="teacher@mergington.edu" required />
            <input type="password" id="password" placeholder="Teacher password" required />
            <button type="submit">Log in</button>
          </form>
        </div>
        <button id="logout-button" class="hidden" type="button">Log out</button>
      </div>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Teacher Controls</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="teacher-tools" class="hidden">
          <h4>Change Password</h4>
          <form id="password-form">
            <div class="form-group">
              <label for="current-password">Current Password:</label>
              <input type="password" id="current-password" required />
            </div>
            <div class="form-group">
              <label for="new-password">New Password:</label>
              <input type="password" id="new-password" minlength="8" required />
            </div>
            <button type="submit">Update Password</button>
          </form>
        </div>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
